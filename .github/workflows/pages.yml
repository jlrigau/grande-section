name: Déploiement du site

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Polices emoji pour les PDF
        run: sudo apt-get update -qq && sudo apt-get install -y -qq fonts-noto-color-emoji
      - name: Assembler le site (application + contenus)
        run: |
          mkdir -p _site/content
          cp -r site/. _site/
          cp 01-projet-annuel.md 02-programmation-annuelle.md _site/content/
          cp -r 03-progressions 04-evaluations _site/content/
      - name: Générer les PDF (documents × zones + fiches élève)
        run: bash scripts/generer-pdf.sh _site
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
